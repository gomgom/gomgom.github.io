<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>곰곰 gomgom - 더 나은 세상을 위하여</title>
    <!-- Tailwind CSS (스타일링 프레임워크) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome (아이콘) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts (Noto Sans KR) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
        }
        /* 텍스트 가독성을 위한 텍스트 쉐도우 */
        .text-shadow {
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 flex flex-col min-h-screen">

    <!-- 1. 헤더 영역 (소개 & 연락처) -->
    <header class="w-full py-16 px-4 text-center bg-white">
        <div class="max-w-2xl mx-auto space-y-4">
            <h1 class="text-4xl font-bold tracking-tight text-gray-900">
                곰곰 <span class="text-gray-500 font-light">gomgom</span>
            </h1>
            <p class="text-lg text-gray-600 break-keep">
                더 나은 세상을 위해서 살아가고 있습니다.
            </p>
            
            <div class="flex items-center justify-center gap-2 text-gray-500 hover:text-gray-900 transition-colors mt-6">
                <i class="fa-regular fa-envelope text-xl"></i>
                <a href="mailto:me@gomgom.net" class="text-base font-medium border-b border-transparent hover:border-gray-900 transition-all">
                    me@gomgom.net
                </a>
            </div>
        </div>
    </header>

    <!-- 2. 메인 그리드 영역 (3칸 통합 카드) -->
    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-20 flex flex-col justify-center">
        <!-- 
            하나의 큰 덩어리 컨테이너
            rounded-3xl: 전체적인 외곽선을 둥글게
            shadow-2xl: 깊은 그림자
            overflow-hidden: 내부 이미지가 둥근 모서리를 넘지 않도록 자름
        -->
        <div class="grid grid-cols-1 md:grid-cols-3 w-full h-auto md:h-[600px] rounded-3xl shadow-2xl overflow-hidden bg-white">

            <!-- [섹션 1] 곰곰쌤 -->
            <!-- border-b md:border-b-0 md:border-r: 모바일엔 아래 구분선, PC엔 오른쪽 구분선 -->
            <a href="https://the-student.agency" target="_blank" class="group relative h-96 md:h-full w-full cursor-pointer block border-b border-white/10 md:border-b-0 md:border-r md:border-white/10">
                <!-- 배경 이미지 -->
                <div class="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-110"
                     style="background-image: url('https://images.unsplash.com/photo-1509062522246-3755977927d7?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');">
                </div>
                <!-- 어두운 오버레이 -->
                <div class="absolute inset-0 bg-black/40 group-hover:bg-black/30 transition-colors duration-300"></div>
                
                <!-- 텍스트 내용 -->
                <div class="absolute inset-0 p-10 flex flex-col justify-end text-white">
                    <span class="text-sm font-medium opacity-80 mb-2 text-yellow-300 tracking-wider">EDUCATOR</span>
                    <h2 class="text-4xl font-bold mb-3">곰곰쌤</h2>
                    <p class="text-lg font-light opacity-90 mb-6 leading-relaxed">
                        곰곰이 생각하는<br>
                        학생 주도성
                    </p>
                    <div class="flex items-center text-sm font-medium opacity-70 group-hover:opacity-100 transition-opacity">
                        <span>the-student.agency</span>
                        <i class="fa-solid fa-arrow-right ml-2 transform group-hover:translate-x-1 transition-transform"></i>
                    </div>
                </div>
            </a>

            <!-- [섹션 2] devgomgom -->
            <a href="#" class="group relative h-96 md:h-full w-full cursor-pointer block border-b border-white/10 md:border-b-0 md:border-r md:border-white/10">
                <!-- 배경 이미지 -->
                <div class="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-110"
                     style="background-image: url('https://images.unsplash.com/photo-1555066931-4365d14bab8c?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');">
                </div>
                <div class="absolute inset-0 bg-black/50 group-hover:bg-black/40 transition-colors duration-300"></div>
                
                <div class="absolute inset-0 p-10 flex flex-col justify-end text-white">
                    <span class="text-sm font-medium opacity-80 mb-2 text-cyan-300 tracking-wider">DEVELOPER</span>
                    <h2 class="text-4xl font-bold mb-3 font-mono">devgomgom</h2>
                    <p class="text-lg font-light opacity-90 mb-6 leading-relaxed">
                        개발 공부하는<br>
                        데브곰곰
                    </p>
                    <div class="flex items-center text-sm font-medium opacity-70 group-hover:opacity-100 transition-opacity">
                        <span>Portfolio / GitHub</span>
                        <i class="fa-solid fa-code ml-2 transform group-hover:translate-x-1 transition-transform"></i>
                    </div>
                </div>
            </a>

            <!-- [섹션 3] 곰곰 블로그 -->
            <a href="#" class="group relative h-96 md:h-full w-full cursor-pointer block">
                <!-- 배경 이미지 -->
                <div class="absolute inset-0 bg-cover bg-center transition-transform duration-700 group-hover:scale-110"
                     style="background-image: url('https://images.unsplash.com/photo-1455390582262-044cdead277a?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');">
                </div>
                <div class="absolute inset-0 bg-black/40 group-hover:bg-black/30 transition-colors duration-300"></div>
                
                <div class="absolute inset-0 p-10 flex flex-col justify-end text-white">
                    <span class="text-sm font-medium opacity-80 mb-2 text-green-300 tracking-wider">WRITER</span>
                    <h2 class="text-4xl font-bold mb-3">곰곰 블로그</h2>
                    <p class="text-lg font-light opacity-90 mb-6 leading-relaxed">
                        일상을 기록하고<br>
                        사색합니다
                    </p>
                    <div class="flex items-center text-sm font-medium opacity-70 group-hover:opacity-100 transition-opacity">
                        <span>Blog Post</span>
                        <i class="fa-solid fa-pen-nib ml-2 transform group-hover:translate-x-1 transition-transform"></i>
                    </div>
                </div>
            </a>

        </div>
    </main>

    <!-- 푸터 -->
    <footer class="py-6 text-center text-gray-400 text-sm">
        &copy; 2024 Gomgom. All rights reserved.
    </footer>

</body>
</html>
